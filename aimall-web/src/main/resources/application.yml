server:
  port: 6050
  servlet:
    context-path: /api
ws:
  port: 6051
spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${AIMALL_DB_URL:jdbc:mysql://localhost:3306/aimall?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8}
    username: ${AIMALL_DB_USERNAME:root}
    password: ${AIMALL_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 5
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  codec:
    default-charset: UTF-8
  #elasticsearch相关
  elasticsearch:
    uris: ${AIMALL_ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${AIMALL_ELASTICSEARCH_USERNAME:}
    password: ${AIMALL_ELASTICSEARCH_PASSWORD:}
  # AI相关
  ai:
    #向量数据库
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: aimall-index-vectorstore
        dimensions: 1024 #embeddinggemma:768  百炼 text-embedding-v4:1024 # 向量维度（根据使用的嵌入模型调整）
    # 使用openai 对接 阿里百炼
    openai:
      api-key: ${AIMALL_OPENAI_API_KEY:}
      base-url: ${AIMALL_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/}
      chat:
        completions-path: v1/chat/completions
        options:
          model: qwen3-32b  #qwen3-max 使用max 调用mcp 报错toolName cannot be null
      embedding:
        options:
          model: text-embedding-v4
    dashscope:
      base-url: ${AIMALL_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/}
      api-key: ${AIMALL_DASHSCOPE_API_KEY:}
      embedding:
        model: text-embedding-v4
    # 对接本地ollama
    ollama:
      base-url: ${AIMALL_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: qwen3:8b
      embedding:
        model: embeddinggemma:300m
    mcp:
      client:
        enabled: true
        name: my-mcp-client
        version: 1.0.0
        request-timeout: 30s
        type: SYNC  # or ASYNC for reactive applications
        streamable-http:
          connections:
            mcp-server:
              url: ${AIMALL_MCP_SERVER_URL:http://localhost:8084}
mybatis:
  configuration:
    map-underscore-to-camel-case: true
#项目目录
project:
  folder: ${AIMALL_PROJECT_FOLDER:./data/aimall/}
  auto-checkpay: true #自动检查支付订单
  domain: ${AIMALL_PROJECT_DOMAIN:http://localhost}
  #开启ai聊天轮数限制
  ai-chat-limit: 0
#支付宝
alipay:
  appid: ${AIMALL_ALIPAY_APP_ID:}
  # 应用私钥
  appPrivateKey: ${AIMALL_ALIPAY_APP_PRIVATE_KEY:}
  appCertPath: alipay-sandbox/appPublicCert.crt
  alipayPublicCertPath: alipay-sandbox/alipayPublicCert.crt
  alipayRootCertPath: alipay-sandbox/alipayRootCert.crt
  serverUrl: ${AIMALL_ALIPAY_SERVER_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
#日志级别
log:
  root:
    level: debug
