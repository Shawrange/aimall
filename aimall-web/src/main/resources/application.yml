server:
  port: 6050
  servlet:
    context-path: /api

ws:
  port: 6051

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${AIMALL_DB_URL:jdbc:mysql://localhost:3306/aimall?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8}
    username: ${AIMALL_DB_USERNAME:}
    password: ${AIMALL_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 5
  data:
    redis:
      host: ${AIMALL_REDIS_HOST:127.0.0.1}
      port: ${AIMALL_REDIS_PORT:6379}
  codec:
    default-charset: UTF-8
  elasticsearch:
    uris: ${AIMALL_ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${AIMALL_ELASTICSEARCH_USERNAME:}
    password: ${AIMALL_ELASTICSEARCH_PASSWORD:}
  ai:
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: aimall-index-vectorstore
        dimensions: 1024
    openai:
      api-key: ${AIMALL_OPENAI_API_KEY:}
      base-url: ${AIMALL_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/}
      chat:
        completions-path: v1/chat/completions
        options:
          model: ${AIMALL_OPENAI_CHAT_MODEL:qwen3-32b}
      embedding:
        options:
          model: ${AIMALL_OPENAI_EMBEDDING_MODEL:text-embedding-v4}
    otherai:
      base-url: ${AIMALL_OTHERAI_BASE_URL:https://ark.cn-beijing.volces.com/api}
      api-key: ${AIMALL_OTHERAI_API_KEY:}
      embeddingsPath: /v3/embeddings/multimodal
      embedding:
        model: ${AIMALL_OTHERAI_EMBEDDING_MODEL:doubao-embedding-vision-251215}
    ollama:
      base-url: ${AIMALL_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${AIMALL_OLLAMA_CHAT_MODEL:qwen3:8b}
      embedding:
        model: ${AIMALL_OLLAMA_EMBEDDING_MODEL:embeddinggemma:300m}
    mcp:
      client:
        enabled: true
        name: my-mcp-client
        version: 1.0.0
        request-timeout: 30s
        type: SYNC
        streamable-http:
          connections:
            mcp-server:
              url: ${AIMALL_MCP_SERVER_URL:http://localhost:8084}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

project:
  folder: ${AIMALL_PROJECT_FOLDER:c:/webser/web_app/aimall/}
  auto-checkpay: true
  domain: ${AIMALL_PROJECT_DOMAIN:}
  ai-chat-limit: ${AIMALL_AI_CHAT_LIMIT:0}

alipay:
  appid: ${AIMALL_ALIPAY_APP_ID:}
  appPrivateKey: ${AIMALL_ALIPAY_APP_PRIVATE_KEY:}
  appCertPath: ${AIMALL_ALIPAY_APP_CERT_PATH:}
  alipayPublicCertPath: ${AIMALL_ALIPAY_PUBLIC_CERT_PATH:}
  alipayRootCertPath: ${AIMALL_ALIPAY_ROOT_CERT_PATH:}
  serverUrl: ${AIMALL_ALIPAY_SERVER_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}

log:
  root:
    level: debug
